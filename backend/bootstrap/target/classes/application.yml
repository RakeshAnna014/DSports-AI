spring:
  application:
    name: dsports-ai

  profiles:
    active: local

  reactor:
    context-propagation:
      enable: true

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    serialization:
      write-dates-as-timestamps: false
      write-date-keys-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-problem-detail: true

  r2dbc:
    pool:
      initial-size: 5
      max-size: 20
      max-create-connection-time: 5s
      max-idle-time: 30m
      validation-query: SELECT 1

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  info:
    env:
      enabled: true

info:
  application:
    name: 'DSports-AI :: Bootstrap'
    version: '1.0.0-SNAPSHOT'
    description: 'Application entry point — composition root'
  java:
    version: '21.0.6'

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: true
  cache:
    disabled: true

logging:
  pattern:
    level: "%5p [%X{correlationId}]"

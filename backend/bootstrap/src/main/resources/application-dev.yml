spring:
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:dsports}
    username: ${DB_USER:dsports}
    password: ${DB_PASSWORD}

  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:dsports}
    user: ${DB_USER:dsports}
    password: ${DB_PASSWORD}

logging:
  level:
    com.dsports: INFO

version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: dsports-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: dsports
      POSTGRES_USER: dsports
      POSTGRES_PASSWORD: dsports123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: